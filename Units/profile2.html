<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .body {
            height: 100vh;
            width: 100vw;
        }

        .card{
            width: 330px;
            height: 420px;
            background-color: aliceblue;
            border-radius: 25px;
        }
        #header {
            width: 100%;
            height: 120px;
            background-color: rgb(2, 130, 89);
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
        }
        .child{
            width: 50px;
            height: 50px;
        }

        .items1 {
            margin-top:65px;
            align-items: center;
        }

        .profile {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 4px white solid;
            border-radius: 50%;
            top: 75px;
            right: 56%;
        }
    </style>
</head>

<body>
    <div class="card">
        <div id="header">

            <div class="items"><img class="profile"
                    src="https://img.freepik.com/premium-photo/design-professional-profile-picture-with-sharp-focus-natural-lighting-clean-neutral-background_880763-20280.jpg"
                    alt="profile">
            </div>

        </div>
        <div class="child">
            <div class="items1">
                <h2>CodingLab</h2>
                <p>Youtuber & Blogger</p>
            </div>
            <div class="items"></div>
            <div class="items"></div>
        </div>
    </div>
</body>

</html>
