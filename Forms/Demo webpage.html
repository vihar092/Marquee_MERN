<!DOCTYPE html>
<html>
<head>
  <title>Generator Landing Page</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      color: #111;
      background: white;
    }

    header {
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 70px;
    }

    .logo {
      font-size: 26px;
      font-weight: 900;
      font-style: italic;
      letter-spacing: 1px;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 35px;
      font-size: 15px;
    }

    nav a {
      text-decoration: none;
      color: black;
    }

    .install-btn {
      padding: 16px 28px;
      border: 2px solid black;
      background: white;
      font-weight: bold;
      font-size: 15px;
      box-shadow: 5px 5px 0 black;
      cursor: pointer;
    }

    .icon-box {
      width: 45px;
      height: 45px;
      background: #111;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      border-radius: 3px;
    }

    .hero {
      text-align: center;
      padding: 120px 20px 130px;
    }

    .hero small {
      font-weight: bold;
      letter-spacing: 8px;
      font-size: 14px;
    }

    .hero h1 {
      font-family: Georgia, serif;
      font-size: 58px;
      line-height: 1.2;
      margin: 40px auto 25px;
      max-width: 950px;
    }

    .hero p {
      font-size: 20px;
      color: #555;
      line-height: 1.7;
      max-width: 850px;
      margin: 0 auto 45px;
    }

    .learn-btn {
      padding: 18px 40px;
      background: white;
      border: 2px solid black;
      font-size: 18px;
      font-weight: bold;
      box-shadow: 7px 7px 0 black;
      cursor: pointer;
    }

    .brands {
      border-top: 1px solid #ddd;
      padding: 55px 90px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      font-size: 28px;
      font-weight: bold;
    }

    .brand-light {
      font-weight: 400;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">GENERATOR</div>

    <nav>
      <a href="#">Home</a>
      <a href="#">Pages⌄</a>
      <a href="#">Blog Templates⌄</a>
      <button class="install-btn">Install Theme</button>
      <div class="icon-box">⌘</div>
    </nav>
  </header>

  <section class="hero">
    <small>HOME PAGE</small>

    <h1>
      Build and manage your HubSpot<br>
      website without code.
    </h1>

    <p>
      This HubSpot website theme provides marketers with the tools they need to build modern
      websites, landing pages and blogs with HubSpot’s drag and drop developer.
    </p>

    <button class="learn-btn">Learn more</button>
  </section>

  <section class="brands">
    <div>LACOSTE</div>
    <div class="brand-light">JUNIPER</div>
    <div>HubSpot</div>
    <div>NETFLIX</div>
  </section>

</body>
</html>
