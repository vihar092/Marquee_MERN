<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Types of CSS</title>

    <style>
        /* Page Styling */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(to right, #74ebd5, #9face6);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Main Container */
        .container {
            width: 600px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* Heading */
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        /* Paragraph */
        p {
            background-color: #f8f9fa;
            padding: 15px;
            border-left: 5px solid #3498db;
            border-radius: 8px;
            color: #444;
            line-height: 1.6;
            text-align: justify;
        }

        /* List */
        ul {
            list-style: none;
            padding: 0;
            margin-top: 25px;
        }

        li {
            padding: 15px;
            margin: 12px 0;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
        }

        li:hover {
            transform: scale(1.03);
        }

        /* Different Styles */
        .inline {
            background-color: #ff7675;
            color: white;
        }

        .internal {
            background-color: #55efc4;
            color: #2d3436;
        }

        .external {
            background-color: #74b9ff;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Types of CSS</h1>

        <p>
            CSS (Cascading Style Sheets) is used to style HTML elements.
            There are three different ways to apply CSS:
            <strong>Inline CSS</strong>,
            <strong>Internal CSS</strong>, and
            <strong>External CSS</strong>.
            Each method has its own use depending on the size and requirements of the project.
        </p>

        <ul>
            <li class="inline">Inline CSS</li>
            <li class="internal">Internal CSS</li>
            <li class="external">External CSS</li>
        </ul>

    </div>

</body>
</html>
